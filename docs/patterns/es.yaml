# Patrones AI-smell — Español
# kind: phrase | regex | structure
# severity: 1 (sospecha) | 2 (probable) | 3 (casi seguro)

patterns:
  # ---- Estructura paralela negativa ----
  - id: es.no_solo_sino
    kind: regex
    severity: 3
    pattern: '(?i)\bno se trata solo de\b|\bno es solo\b.{1,40}\bsino\b|\bno solo\b.{1,40}\bsino que también\b'
    message: '"no es solo X, sino Y" — fórmula muy usada por IA'
    suggestion: di la idea positiva sin el contraste de relleno

  - id: es.mas_que
    kind: regex
    severity: 2
    pattern: '(?i)\bes más que\b.{1,40}\bes\b'
    message: '"es más que X, es Y" — fórmula inflada'
    suggestion: afirma directamente lo que es

  # ---- Muletillas de relleno ----
  - id: es.vale_pena_destacar
    kind: phrase
    severity: 3
    pattern: vale la pena destacar
    message: '"vale la pena destacar" — muletilla muy típica de IA'
    suggestion: solo destácalo

  - id: es.cabe_mencionar
    kind: phrase
    severity: 3
    pattern: cabe mencionar
    message: '"cabe mencionar" — muletilla típica de IA'
    suggestion: menciónalo sin anunciarlo

  - id: es.es_importante_notar
    kind: phrase
    severity: 3
    pattern: es importante (notar|señalar|destacar|mencionar)
    message: '"es importante notar/señalar" — anuncio innecesario'
    suggestion: borra y pasa directo al punto

  - id: es.en_ultima_instancia
    kind: phrase
    severity: 2
    pattern: en última instancia
    message: '"en última instancia" — cierre típico de IA'
    suggestion: '"al final" o simplemente borrar'

  - id: es.en_este_sentido
    kind: phrase
    severity: 2
    pattern: en este sentido
    message: '"en este sentido" — conector de relleno'
    suggestion: borrar o reemplazar por "así"

  - id: es.por_otro_lado
    kind: phrase
    severity: 1
    pattern: por otro lado
    message: '"por otro lado" — conector binario sobreusado'
    suggestion: solo si hay contraste real

  - id: es.dicho_esto
    kind: phrase
    severity: 2
    pattern: dicho esto
    message: '"dicho esto" — pivote artificial de IA'
    suggestion: borrar, la transición ya se entiende

  - id: es.en_resumen
    kind: phrase
    severity: 2
    pattern: en (resumen|definitiva|síntesis)
    message: '"en resumen" — cierre formulario de IA'
    suggestion: deja que el último párrafo cierre solo

  # ---- Inflación de importancia ----
  - id: es.se_erige
    kind: phrase
    severity: 3
    pattern: se (erige|posiciona|consolida|establece) como
    message: '"se erige como" — verbo inflado de IA'
    suggestion: usa "es"

  - id: es.constituye_testimonio
    kind: regex
    severity: 3
    pattern: '(?i)\b(constituye|representa|es) un (testimonio|reflejo|símbolo)\b'
    message: '"constituye un testimonio de" — locución inflada'
    suggestion: borra, di qué hace o significa concretamente

  - id: es.juega_papel
    kind: regex
    severity: 2
    pattern: '(?i)juega un papel (crucial|fundamental|clave|vital|importante)'
    message: '"juega un papel" — calco inflado de IA'
    suggestion: di qué hace específicamente

  - id: es.momento_clave
    kind: regex
    severity: 2
    pattern: '(?i)\b(marca|representa) un (momento|punto) (clave|crucial|pivotal|decisivo)'
    message: '"momento clave / histórico" — inflación de IA'
    suggestion: di la fecha y lo que pasó

  - id: es.panorama
    kind: regex
    severity: 2
    pattern: '(?i)\b(panorama|paisaje|horizonte) (en evolución|cambiante|dinámico)\b'
    message: '"panorama" como metáfora — abstracto y AI'
    suggestion: di el contexto concreto

  # ---- Vocabulario AI alto ----
  - id: es.profundizar
    kind: phrase
    severity: 2
    pattern: profundizar en (las complejidades|los matices|los detalles)
    message: '"profundizar" como verbo abstracto — sobreusado por IA'
    suggestion: '"explorar" o entrar al tema directo'

  - id: es.tejido
    kind: regex
    severity: 2
    pattern: '(?i)\b(rico|complejo|intrincado) tejido\b'
    message: '"tejido social/cultural" — metáfora sobreusada'
    suggestion: describe lo concreto

  - id: es.fascinante_mundo
    kind: regex
    severity: 2
    pattern: '(?i)\b(fascinante|apasionante|cautivador) mundo de\b'
    message: '"fascinante mundo de" — gancho editorial de IA'
    suggestion: borra el adjetivo

  - id: es.en_el_corazon
    kind: phrase
    severity: 2
    pattern: en el (corazón|centro) de
    message: '"en el corazón de" — cliché de IA'
    suggestion: usa la palabra concreta

  - id: es.rico_en
    kind: regex
    severity: 1
    pattern: '(?i)\brico en (historia|cultura|tradición|sabor)\b'
    message: '"rico en X" — promo turística de IA'
    suggestion: di qué tiene específicamente

  # ---- Tono servil de IA ----
  - id: es.espero_sirva
    kind: regex
    severity: 3
    pattern: '(?i)espero que .{1,30}(sirva|ayude|haya sido útil|funcione)'
    message: '"espero que esto te sirva" — cierre tipo chatbot'
    suggestion: borrar

  - id: es.claro_por_supuesto
    kind: regex
    severity: 3
    pattern: '(?i)^(¡)?(claro|por supuesto|desde luego|con gusto)(!|,)'
    message: '"claro, por supuesto" — apertura servil'
    suggestion: borrar y arrancar con el contenido

  - id: es.gran_pregunta
    kind: regex
    severity: 3
    pattern: '(?i)(¡)?(qué|gran) (gran |buena )?pregunta'
    message: '"gran pregunta" — apertura aduladora'
    suggestion: borrar

  - id: es.absolutamente_correcto
    kind: phrase
    severity: 3
    pattern: tienes (toda la |)razón
    message: '"absolutamente correcto" — validación servil'
    suggestion: borrar

  # ---- Cierres genéricos ----
  - id: es.futuro_brillante
    kind: regex
    severity: 3
    pattern: '(?i)el futuro (se ve |luce |parece )?(brillante|prometedor)'
    message: '"el futuro es brillante" — cierre vacío'
    suggestion: di qué pasará concretamente

  - id: es.tiempos_emocionantes
    kind: regex
    severity: 3
    pattern: '(?i)(tiempos|momentos) emocionantes'
    message: '"tiempos emocionantes" — cierre vacío'
    suggestion: borrar

  - id: es.viaje_excelencia
    kind: regex
    severity: 2
    pattern: '(?i)camino|viaje|trayecto.{1,20}excelencia'
    message: '"viaje hacia la excelencia" — cliché motivacional'
    suggestion: borrar

  # ---- Hedging excesivo ----
  - id: es.podria_potencialmente
    kind: regex
    severity: 2
    pattern: '(?i)podría (potencialmente|posiblemente|tal vez)'
    message: '"podría potencialmente" — hedging redundante'
    suggestion: usa solo "podría" o sé directo

  # ---- Disclaimer cutoff ----
  - id: es.informacion_limitada
    kind: regex
    severity: 3
    pattern: '(?i)(información (es |)limitada|detalles específicos.{0,20}escasos|según (la |)información disponible)'
    message: '"según la información disponible…" — disclaimer típico de IA'
    suggestion: borrar

  # ---- Verbos inflados (RLHF bloat — taxonomía Pangram) ----
  - id: es.profundizar_verbo
    kind: regex
    severity: 3
    pattern: '(?i)\b(profundizar|adentrarse|sumergirse) en\b'
    message: '"profundizar en" — verbo inflado típico de IA'
    suggestion: '"explorar", "ver", o entrar al tema directo'

  - id: es.embarcarse
    kind: regex
    severity: 2
    pattern: '(?i)\b(embarcarse|emprender un viaje) (en|hacia)\b'
    message: '"embarcarse en" — verbo épico de IA'
    suggestion: '"empezar" o "comenzar"'

  - id: es.navegar_complejidades
    kind: regex
    severity: 3
    pattern: '(?i)navega(r|ndo) (las |por las |a través de las )(complejidades|aristas|dificultades)'
    message: '"navegar las complejidades" — calco directo del inglés'
    suggestion: di qué partes son difíciles específicamente

  - id: es.facilitar
    kind: regex
    severity: 1
    pattern: '(?i)\bfacilita(r|n)? (la |el )?(proceso|comprensión|interacción)'
    message: '"facilitar" como verbo abstracto — corporativo IA'
    suggestion: di qué hace concretamente

  - id: es.optimizar
    kind: regex
    severity: 1
    pattern: '(?i)\boptimiza(r|ndo|do) (la |el |los |las )?'
    message: '"optimizar" — verbo sobreusado por IA'
    suggestion: '"mejorar" o ser específico'

  - id: es.aprovechar
    kind: regex
    severity: 1
    pattern: '(?i)\baprovech(ar|ando|amos) (al máximo |plenamente |)?(el |la |los |las )?(potencial|capacidades|sinergias)'
    message: '"aprovechar" como verbo corporativo IA'
    suggestion: di qué se hace exactamente

  # ---- Sustantivos abstractos (inflación semántica) ----
  - id: es.matiz
    kind: regex
    severity: 2
    pattern: '(?i)\b(los |las )?(matices|sutilezas) (de|del|en)\b'
    message: '"matiz / matices" — abstracto típico de IA'
    suggestion: nombra los detalles específicos

  - id: es.sinergia
    kind: regex
    severity: 2
    pattern: '(?i)\bsinergia(s)? entre\b'
    message: '"sinergia" — jerga corporativa de IA'
    suggestion: di cómo se relacionan en concreto

  - id: es.paradigma
    kind: regex
    severity: 2
    pattern: '(?i)\b(un |el |nuevo )?paradigma\b'
    message: '"paradigma" — sustantivo inflado'
    suggestion: '"forma de hacer", "modelo"'

  - id: es.marco_robusto
    kind: regex
    severity: 2
    pattern: '(?i)\b(un |el |su )?marco (robusto|integral|sólido|completo)\b'
    message: '"marco robusto / sólido" — combinación AI'
    suggestion: di qué es y qué hace

  - id: es.reino
    kind: regex
    severity: 2
    pattern: '(?i)\b(en |del |al )?reino (de|digital|virtual|tecnológico)'
    message: '"el reino de" — metáfora épica de IA'
    suggestion: '"campo", "área", o ser específico'

  # ---- Adjetivos AI (taxonomía Pangram) ----
  - id: es.vibrante
    kind: phrase
    severity: 2
    pattern: vibrante
    message: '"vibrante" — adjetivo promocional de IA'
    suggestion: describe qué lo hace vivo

  - id: es.multifacetico
    kind: phrase
    severity: 2
    pattern: multifacético
    message: '"multifacético" — adjetivo abstracto de IA'
    suggestion: nombra las facetas concretas

  - id: es.meticuloso
    kind: phrase
    severity: 1
    pattern: meticuloso
    message: '"meticuloso" — adjetivo de IA'
    suggestion: '"cuidadoso", "detallado"'

  - id: es.robusto
    kind: regex
    severity: 1
    pattern: '(?i)\brobusto(s|a|as)?\b(?! (modelo|crecimiento))'
    message: '"robusto" aplicado a abstracciones — calco IA'
    suggestion: '"sólido", "fuerte", o algo concreto'

  - id: es.sin_fisuras
    kind: regex
    severity: 2
    pattern: '(?i)\b(sin fisuras|impecable|perfectamente integrado)'
    message: '"sin fisuras" — adjetivo abstracto tipo IA'
    suggestion: '"que funciona junto", "que conecta"'

  - id: es.transformador
    kind: regex
    severity: 2
    pattern: '(?i)\b(experiencia |proceso |momento |poder )transformador'
    message: '"transformador" — adjetivo épico de IA'
    suggestion: di qué cambia exactamente

  - id: es.crucial
    kind: regex
    severity: 1
    pattern: '(?i)\b(es |sea |son )?cruciales?\b'
    message: '"crucial" — adjetivo sobreusado por IA'
    suggestion: '"importante", "necesario" o ser específico'

  # ---- Conectores formales al inicio (firma fuerte AI) ----
  # Severity 2 inline; el chequeo estructural los ve también globalmente
  - id: es.ademas_inicio
    kind: regex
    severity: 2
    pattern: '(?im)^además[,\s]'
    message: '"además," al inicio — conector formal típico IA'
    suggestion: borra el conector, deja que la lógica fluya

  - id: es.por_otra_parte
    kind: regex
    severity: 2
    pattern: '(?i)\bpor otra parte\b'
    message: '"por otra parte" — conector formal de IA'
    suggestion: borrar o reemplazar por algo más natural

  - id: es.adicionalmente
    kind: phrase
    severity: 2
    pattern: adicionalmente
    message: '"adicionalmente" — conector formal (calco de "additionally")'
    suggestion: borrar

  - id: es.en_consecuencia
    kind: phrase
    severity: 2
    pattern: en consecuencia
    message: '"en consecuencia" — conector formal IA'
    suggestion: '"así", "entonces"'

  - id: es.por_lo_tanto
    kind: phrase
    severity: 1
    pattern: por lo tanto
    message: '"por lo tanto" — conector formal sobreusado'
    suggestion: '"así", "entonces"'

  - id: es.no_obstante
    kind: phrase
    severity: 2
    pattern: no obstante
    message: '"no obstante" — conector formal IA'
    suggestion: '"pero", "aunque"'

  - id: es.posteriormente
    kind: phrase
    severity: 2
    pattern: posteriormente
    message: '"posteriormente" — calco de "subsequently"'
    suggestion: '"después", "luego"'

  - id: es.en_primer_lugar
    kind: regex
    severity: 2
    pattern: '(?i)en primer lugar'
    message: '"en primer lugar / segundo lugar / tercer lugar" — enumeración formal IA'
    suggestion: borrar la apertura, ir al punto

  # ---- Cliché de panorama dinámico ----
  - id: es.panorama_dinamico
    kind: regex
    severity: 3
    pattern: '(?i)en (el |un )?(dinámico |actual |evolutivo |cambiante )?panorama( tecnológico| actual| dinámico)?'
    message: '"panorama dinámico" — escena típica de IA'
    suggestion: borrar la apertura, di el contexto concreto

  # ---- Voz académica IA (faltaban casi todos) ----
  - id: es.cabe_destacar
    kind: phrase
    severity: 3
    pattern: cabe (destacar|señalar|resaltar|subrayar|notar)
    message: '"cabe destacar" — muletilla académica de IA'
    suggestion: borra y di la idea directa

  - id: es.es_fundamental
    kind: regex
    severity: 2
    pattern: '(?i)\b(es|resulta) fundamental (comprender|entender|considerar|tener en cuenta|reconocer|analizar)'
    message: '"es fundamental" — muletilla de IA'
    suggestion: borra la apertura, ve al punto

  - id: es.resulta_evidente
    kind: regex
    severity: 3
    pattern: '(?i)\b(resulta|se hace|es) (evidente|claro|patente|manifiesto) que\b'
    message: '"resulta evidente" — muletilla académica de IA'
    suggestion: si es evidente no hace falta decirlo

  - id: es.pone_manifiesto
    kind: regex
    severity: 3
    pattern: '(?i)\bpone(n)? de (manifiesto|relieve)\b'
    message: '"pone de manifiesto" — locución académica IA'
    suggestion: '"muestra", "deja ver"'

  - id: es.como_mencionado
    kind: regex
    severity: 2
    pattern: '(?i)\bcomo (se ha |hemos |)(mencionado|señalado|indicado|expuesto|visto) (anteriormente|previamente|antes)\b'
    message: '"como se mencionó anteriormente" — auto-referencia formularia'
    suggestion: borrar, el lector recuerda

  - id: es.en_este_contexto
    kind: phrase
    severity: 2
    pattern: en (este|dicho|tal|ese) contexto
    message: '"en este contexto" — conector académico IA'
    suggestion: borrar o ser específico

  - id: es.constituye
    kind: regex
    severity: 2
    pattern: '(?i)\bconstituye (un|una) (aspecto|elemento|factor|pilar|piedra angular)'
    message: '"constituye" en vez de "es" — IA evita el verbo simple'
    suggestion: '"es", "funciona como"'

  - id: es.diversos_multiples
    kind: regex
    severity: 2
    pattern: '(?i)\b(diversos|múltiples|variados|numerosos) (factores|elementos|aspectos|dimensiones|perspectivas|matices)\b'
    message: '"diversos / múltiples" — vago típico de IA'
    suggestion: nómbralos concretamente

  - id: es.amplio_diverso
    kind: regex
    severity: 2
    pattern: '(?i)\b(amplio|amplia|extenso|extensa) y (diverso|diversa|variado|variada|complejo|compleja)\b'
    message: '"amplio y diverso" — pareja típica de IA'
    suggestion: deja un solo adjetivo, el más concreto

  - id: es.tricolon_adj
    kind: regex
    severity: 2
    pattern: '(?i)\b(histórico|social|cultural|político|económico|académico|científico|tecnológico),\s+(histórico|social|cultural|político|económico|académico|científico|tecnológico)\s+y\s+(histórico|social|cultural|político|económico|académico|científico|tecnológico)\b'
    message: "tres adjetivos seguidos — ritmo de relleno IA"
    suggestion: rompe el tres, deja uno o cuatro

  - id: es.perspectiva_integral
    kind: regex
    severity: 3
    pattern: '(?i)\b(una|la) (perspectiva|mirada|visión|aproximación|enfoque) (integral|holística|holístico|integradora|integral|comprehensiva)\b'
    message: '"perspectiva integral" — adjetivo IA'
    suggestion: di qué cubre exactamente

  - id: es.analisis_exhaustivo
    kind: regex
    severity: 3
    pattern: '(?i)\b(un |una )?(análisis|estudio|revisión|examen) (exhaustivo|exhaustiva|riguroso|rigurosa|profundo|profunda|detallado|detallada)\b'
    message: '"análisis exhaustivo" — auto-elogio típico'
    suggestion: muestra el análisis, no lo anuncies

  - id: es.refleja_complejidad
    kind: regex
    severity: 3
    pattern: '(?i)\b(refleja|representa|evidencia|encarna) (la |una )?(complejidad|riqueza|profundidad|diversidad)\b'
    message: '"refleja la complejidad de" — locución vacía'
    suggestion: di qué es complejo y por qué

  - id: es.subyace
    kind: regex
    severity: 2
    pattern: '(?i)\bsubyace(n)? (a|en|tras)\b'
    message: '"subyace" — verbo académico de IA'
    suggestion: '"está debajo", "explica"'

  - id: es.cabe_preguntarse
    kind: phrase
    severity: 3
    pattern: cabe (preguntarse|preguntar|cuestionar|cuestionarse)
    message: '"cabe preguntarse" — pregunta retórica típica'
    suggestion: haz la pregunta directamente o bórrala

  - id: es.se_observa
    kind: regex
    severity: 2
    pattern: '(?i)\bse (observa|aprecia|advierte|percibe|constata) que\b'
    message: '"se observa que" — voz pasiva impersonal de IA'
    suggestion: di quién observa, o qué pasa directamente

  - id: es.resulta_interesante
    kind: regex
    severity: 3
    pattern: '(?i)\b(resulta|es|cabe destacar como) (interesante|relevante|significativo|notable|destacable|llamativo) (notar|destacar|señalar|observar|mencionar)'
    message: '"resulta interesante" — comentario meta de IA'
    suggestion: borra el aviso, deja solo el dato

  - id: es.dar_lugar
    kind: regex
    severity: 2
    pattern: '(?i)\bda(n)? lugar a\b'
    message: '"dar lugar a" — locución académica de IA'
    suggestion: '"causa", "produce", "genera"'

  # ---- Aperturas formulaicas AI ----
  - id: es.lo_largo_historia
    kind: phrase
    severity: 2
    pattern: a lo largo (de la historia|del tiempo|de los años|de las décadas)
    message: '"a lo largo de la historia" — apertura genérica'
    suggestion: pon la fecha o periodo concreto

  - id: es.desde_tiempos
    kind: regex
    severity: 3
    pattern: '(?i)\bdesde (tiempos |la antigüedad|los inicios|los albores)\b'
    message: '"desde tiempos inmemoriales / antiguos" — apertura grandilocuente'
    suggestion: aterrizar en algo concreto

  - id: es.mundo_actual
    kind: regex
    severity: 2
    pattern: '(?i)\ben (el |nuestro )?mundo (actual|moderno|contemporáneo|de hoy)\b'
    message: '"en el mundo actual" — escenario genérico de IA'
    suggestion: di el lugar y momento concreto

  - id: es.era_digital
    kind: regex
    severity: 2
    pattern: '(?i)\b(en |de )?(la |esta )?era (digital|de la información|moderna|actual)\b'
    message: '"en la era digital" — cliché temporal'
    suggestion: borrar o ser específico

  # ---- Cierres formulaicos AI ----
  - id: es.en_definitiva
    kind: phrase
    severity: 2
    pattern: en definitiva
    message: '"en definitiva" — cierre formulario de IA'
    suggestion: deja que el último párrafo cierre solo

  - id: es.por_consiguiente
    kind: phrase
    severity: 2
    pattern: por consiguiente
    message: '"por consiguiente" — conector formal IA'
    suggestion: '"así", "entonces"'

  - id: es.en_suma
    kind: phrase
    severity: 2
    pattern: en suma
    message: '"en suma" — cierre formulario'
    suggestion: borrar

  # ---- Hedging académico AI ----
  - id: es.podria_argumentarse
    kind: regex
    severity: 3
    pattern: '(?i)\b(podría|puede) (argumentarse|sostenerse|afirmarse|decirse)\b'
    message: '"podría argumentarse" — hedging tipo IA'
    suggestion: afírmalo o no lo digas

  - id: es.cierta_medida
    kind: regex
    severity: 2
    pattern: '(?i)\b(en cierta medida|hasta cierto punto|en alguna medida)\b'
    message: '"en cierta medida" — hedging vago'
    suggestion: di cuánto exactamente

  # ---- Adjetivos AI extra ----
  - id: es.invaluable
    kind: regex
    severity: 2
    pattern: '(?i)\binvaluable(s)?\b'
    message: '"invaluable" — adjetivo inflado de IA'
    suggestion: '"importante", "útil"'

  - id: es.indispensable
    kind: regex
    severity: 1
    pattern: '(?i)\bindispensable(s)?\b'
    message: '"indispensable" — adjetivo inflado'
    suggestion: '"necesario", "clave"'

  - id: es.intrincado
    kind: phrase
    severity: 2
    pattern: intrincad(o|a|os|as)
    message: '"intrincado" — adjetivo de IA'
    suggestion: '"complicado", "enredado"'

  - id: es.profundo_impacto
    kind: regex
    severity: 2
