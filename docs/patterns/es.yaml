    suggestion: di qué se hace exactamente

  # ---- Sustantivos abstractos (inflación semántica) ----
  - id: es.matiz
    kind: regex
    severity: 2
    pattern: '(?i)\b(los |las )?(matices|sutilezas) (de|del|en)\b'
